<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageToC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg:        #0e0e10;
    --surface:   #18181c;
    --border:    #2a2a32;
    --accent:    #00e5a0;
    --accent2:   #00b37e;
    --text:      #d4d4d8;
    --muted:     #71717a;
    --err:       #f87171;
    --radius:    6px;
    --pixel-off: #22222a;
    --pixel-on:  #ed1c24;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 860px;
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card {
    width: 100%;
    max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .row label {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    width: 110px;
    flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]:read-only { color: var(--muted); cursor: default; }

  button {
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    transition: background .15s, opacity .15s, transform .07s;
    white-space: nowrap;
  }
  button:active { transform: scale(.97); }

  .btn-primary {
    background: var(--accent);
    color: #0e0e10;
  }
  .btn-primary:hover { background: #00ffb3; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

  #preview-wrap {
    display: none;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  #preview-wrap.visible { display: flex; }
  #img-preview {
    max-width: 96px;
    max-height: 96px;
    border-radius: 4px;
    image-rendering: pixelated;
    border: 1px solid var(--border);
  }
  .meta {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .meta span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .meta strong { color: var(--text); font-weight: 500; }

  .drawing-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .drawing-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .tool-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  #pixel-grid {
    --cell-size: 12px;
    display: grid;
    grid-template-columns: repeat(64, var(--cell-size));
    gap: 1px;
    width: max-content;
    max-width: 100%;
    overflow: auto;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #101015;
    user-select: none;
  }
  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    background: var(--pixel-off);
    border: 1px solid rgba(0,0,0,.16);
  }
  .cell.on { background: var(--pixel-on); }

  #progress-wrap {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  #progress-wrap.visible { display: flex; }
  #progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .05s linear;
  }
  #progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .code-header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  #code-output {
    width: 100%;
    min-height: 320px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: #a3e6c8;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 16px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }

  #status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    min-height: 18px;
    color: var(--muted);
  }
  #status.ok  { color: var(--accent); }
  #status.err { color: var(--err); }

  hr { border: none; border-top: 1px solid var(--border); }
  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>ImageToC</h1>
  <span>by Milton Watts — HTML port</span>
</header>

<div class="card">
  <div class="row">
    <label>Source image</label>
    <input type="text" id="t-image" placeholder="source image file" readonly>
    <button class="btn-primary" id="btn-browse">Browse</button>
    <input type="file" id="file-input" accept=".jpg,.jpeg,.gif,.png,.bmp,image/*">
  </div>

  <div id="preview-wrap">
    <img id="img-preview" alt="preview">
    <div class="meta">
      <span>Size: <strong id="meta-size">—</strong></span>
      <span>Pixels: <strong id="meta-pixels">—</strong></span>
      <span>Output: <strong id="meta-bytes">—</strong> bytes (est.)</span>
    </div>
  </div>

  <div class="drawing-wrap">
    <div class="drawing-toolbar">
      <button class="btn-secondary" id="tool-draw">Draw</button>
      <button class="btn-secondary" id="tool-erase">Erase</button>
      <button class="btn-secondary" id="btn-clear-grid">Clear</button>
      <button class="btn-secondary" id="btn-invert-grid">Invert</button>
      <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;">
        Color
        <input type="color" id="draw-color" value="#ed1c24" style="width:30px;height:24px;border:none;background:transparent;padding:0;">
      </label>
      <button class="btn-primary" id="btn-convert-grid">Use Drawing (8×64)</button>
      <span class="tool-chip" id="tool-state">Mode: Draw · 8×64 locked</span>
    </div>
    <div id="pixel-grid" aria-label="8 by 64 drawing grid"></div>
  </div>

  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-label">Converting…</div>
  </div>

  <hr>

  <div>
    <div class="code-header">
      <span>Generated C Code</span>
      <button class="btn-secondary" id="btn-copy" disabled>Copy</button>
    </div>
    <textarea id="code-output" spellcheck="false" readonly placeholder="// C source will appear here after selecting an image…"></textarea>
  </div>

  <hr>

  <div class="row">
    <label>Output file</label>
    <input type="text" id="t-code" placeholder="dest code file" readonly>
    <button class="btn-secondary" id="btn-save" disabled>Save As</button>
  </div>

  <div id="status"></div>
</div>

<script>
(() => {
  const GRID_H = 8;
  const GRID_W = 64;

  const fileInput   = document.getElementById('file-input');
  const btnBrowse   = document.getElementById('btn-browse');
  const btnSave     = document.getElementById('btn-save');
  const btnCopy     = document.getElementById('btn-copy');
  const tImage      = document.getElementById('t-image');
  const tCode       = document.getElementById('t-code');
  const codeOutput  = document.getElementById('code-output');
  const imgPreview  = document.getElementById('img-preview');
  const previewWrap = document.getElementById('preview-wrap');
  const progressWrap  = document.getElementById('progress-wrap');
  const progressBar   = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  const metaSize    = document.getElementById('meta-size');
  const metaPixels  = document.getElementById('meta-pixels');
  const metaBytes   = document.getElementById('meta-bytes');
  const statusEl    = document.getElementById('status');

  const pixelGridEl = document.getElementById('pixel-grid');
  const toolDraw = document.getElementById('tool-draw');
  const toolErase = document.getElementById('tool-erase');
  const toolState = document.getElementById('tool-state');
  const btnClearGrid = document.getElementById('btn-clear-grid');
  const btnInvertGrid = document.getElementById('btn-invert-grid');
  const btnConvertGrid = document.getElementById('btn-convert-grid');
  const drawColorInput = document.getElementById('draw-color');

  let generatedCode = '';
  let sourceFileName = '';
  let drawMode = 'draw';
  let isPointerDown = false;
  let drawColor = hexToRgb(drawColorInput.value);
  const gridPixels = Array.from({ length: GRID_H }, () => Array(GRID_W).fill(0));

  btnBrowse.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    handleFile(file);
  });

  btnCopy.addEventListener('click', async () => {
    if (!generatedCode) return;
    try {
      await navigator.clipboard.writeText(generatedCode);
      setStatus('Copied to clipboard.', 'ok');
    } catch {
      setStatus('Clipboard access denied — select all and copy manually.', 'err');
    }
  });

  btnSave.addEventListener('click', () => {
    if (!generatedCode) return;
    const suggestedName = tCode.value || replaceExt(sourceFileName || 'drawing.c', 'c');
    const blob = new Blob([generatedCode], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), { href: url, download: suggestedName });
    a.click();
    URL.revokeObjectURL(url);
    tCode.value = suggestedName;
    setStatus(`File "${suggestedName}" downloaded.`, 'ok');
  });

  toolDraw.addEventListener('click', () => setTool('draw'));
  toolErase.addEventListener('click', () => setTool('erase'));
  btnClearGrid.addEventListener('click', () => {
    fillGrid(0);
    setStatus('Drawing cleared.', 'ok');
  });
  btnInvertGrid.addEventListener('click', () => {
    for (let r = 0; r < GRID_H; r++) {
      for (let c = 0; c < GRID_W; c++) {
        setGridPixel(r, c, gridPixels[r][c] ? 0 : 1, true);
      }
    }
    setStatus('Drawing inverted.', 'ok');
  });
  btnConvertGrid.addEventListener('click', () => {
    convertDrawing();
  });
  drawColorInput.addEventListener('input', () => {
    drawColor = hexToRgb(drawColorInput.value);
    document.documentElement.style.setProperty('--pixel-on', drawColorInput.value);
    setStatus(`Drawing color set to ${drawColorInput.value}.`, 'ok');
  });

  document.addEventListener('pointerup', () => {
    isPointerDown = false;
  });

  initPixelGrid();
  setTool('draw');
  document.documentElement.style.setProperty('--pixel-on', drawColorInput.value);

  function handleFile(file) {
    setStatus('');
    sourceFileName = file.name;
    tImage.value = file.name;
    tCode.value = replaceExt(file.name, 'c');

    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        imgPreview.src = ev.target.result;
        metaSize.textContent = `${img.width} × ${img.height}`;
        metaPixels.textContent = `${(img.width * img.height).toLocaleString()}`;
        metaBytes.textContent = `${(img.width * img.height * 3).toLocaleString()}`;
        previewWrap.classList.add('visible');

        disableControlsDuringWork();

        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, img.width, img.height);
        convertAsync(imageData, img.width, img.height, file.name);
      };
      img.onerror = () => {
        setStatus(`Unable to open file "${file.name}"`, 'err');
        reset();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function convertDrawing() {
    const canvas = document.createElement('canvas');
    canvas.width = GRID_W;
    canvas.height = GRID_H;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(GRID_W, GRID_H);

    for (let row = 0; row < GRID_H; row++) {
      for (let col = 0; col < GRID_W; col++) {
        const idx = (row * GRID_W + col) * 4;
        const on = gridPixels[row][col] === 1;
        imageData.data[idx] = on ? drawColor.r : 0;
        imageData.data[idx + 1] = on ? drawColor.g : 0;
        imageData.data[idx + 2] = on ? drawColor.b : 0;
        imageData.data[idx + 3] = 255;
      }
    }

    sourceFileName = 'drawing_8x64.png';
    tImage.value = 'Drawing board (8x64)';
    tCode.value = 'drawing_8x64.c';
    imgPreview.src = canvas.toDataURL('image/png');
    metaSize.textContent = `${GRID_W} × ${GRID_H}`;
    metaPixels.textContent = `${(GRID_W * GRID_H).toLocaleString()}`;
    metaBytes.textContent = `${(GRID_W * GRID_H * 3).toLocaleString()}`;
    previewWrap.classList.add('visible');

    disableControlsDuringWork();
    convertAsync(imageData, GRID_W, GRID_H, sourceFileName);
  }

  function convertAsync(imageData, W, H, fileName) {
    const CHUNK = 20;
    const data = imageData.data;
    const parts = [];
    parts.push(`  `);

    let row = 0;

    function processChunk() {
      const end = Math.min(row + CHUNK, H);
      for (; row < end; row++) {
        let line = '\n  ';
        for (let col = 0; col < W; col++) {
          const idx = (row * W + col) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          line += `${r.toString().padStart(3)}, ${g.toString().padStart(3)}, ${b.toString().padStart(3)}, `;
        }
        parts.push(line);
      }

      const pct = Math.round((row / H) * 100);
      progressBar.style.width = pct + '%';
      progressLabel.textContent = `Converting… ${pct}% (row ${row} / ${H})`;

      if (row < H) {
        setTimeout(processChunk, 0);
      } else {
        finalise(parts, fileName, W, H);
      }
    }

    setTimeout(processChunk, 0);
  }

  function finalise(parts, fileName, width, height) {
    const pixelRows = parts.join('').replace(/,\s*$/, '');
    const code = buildSketchCode(width, height, pixelRows);

    generatedCode = code;
    codeOutput.value = code;

    progressWrap.classList.remove('visible');
    progressBar.style.width = '0%';
    btnBrowse.disabled = false;
    btnSave.disabled = false;
    btnCopy.disabled = false;
    btnConvertGrid.disabled = false;
    setStatus(`Conversion complete for ${fileName} — ${generatedCode.length.toLocaleString()} characters.`, 'ok');
  }

  function initPixelGrid() {
    for (let row = 0; row < GRID_H; row++) {
      for (let col = 0; col < GRID_W; col++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = row;
        cell.dataset.col = col;
        cell.addEventListener('pointerdown', onCellPointerDown);
        cell.addEventListener('pointerenter', onCellPointerEnter);
        pixelGridEl.appendChild(cell);
      }
    }
  }

  function onCellPointerDown(e) {
    isPointerDown = true;
    paintCell(e.currentTarget);
  }

  function onCellPointerEnter(e) {
    if (!isPointerDown) return;
    paintCell(e.currentTarget);
  }

  function paintCell(cell) {
    const row = Number(cell.dataset.row);
    const col = Number(cell.dataset.col);
    const value = drawMode === 'draw' ? 1 : 0;
    setGridPixel(row, col, value);
  }

  function setGridPixel(row, col, value, silent = false) {
    if (gridPixels[row][col] === value) return;
    gridPixels[row][col] = value;
    const cellIndex = row * GRID_W + col;
    const cell = pixelGridEl.children[cellIndex];
    cell.classList.toggle('on', value === 1);
    if (!silent) {
      setStatus(`Pixel ${row},${col} ${value ? 'on' : 'off'}.`, 'ok');
    }
  }

  function fillGrid(value) {
    for (let row = 0; row < GRID_H; row++) {
      for (let col = 0; col < GRID_W; col++) {
        setGridPixel(row, col, value, true);
      }
    }
  }

  function setTool(mode) {
    drawMode = mode;
    toolDraw.classList.toggle('btn-primary', mode === 'draw');
    toolDraw.classList.toggle('btn-secondary', mode !== 'draw');
    toolErase.classList.toggle('btn-primary', mode === 'erase');
    toolErase.classList.toggle('btn-secondary', mode !== 'erase');
    toolState.textContent = `Mode: ${mode === 'draw' ? 'Draw' : 'Erase'} · 8×64 locked`;
  }

  function disableControlsDuringWork() {
    btnBrowse.disabled = true;
    btnSave.disabled = true;
    btnCopy.disabled = true;
    btnConvertGrid.disabled = true;
    progressWrap.classList.add('visible');
    progressBar.style.width = '0%';
  }

  function replaceExt(filename, newExt) {
    const dot = filename.lastIndexOf('.');
    if (dot >= 0) return filename.substring(0, dot + 1) + newExt;
    return filename + '.' + newExt;
  }

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  function reset() {
    btnBrowse.disabled = false;
    btnConvertGrid.disabled = false;
    progressWrap.classList.remove('visible');
  }

  function buildSketchCode(width, height, pixelRows) {
    return `#include <avr/pgmspace.h>

static const struct PROGMEM {
  int width;
  int height;
  int bytes_per_pixel;
  const byte pixels[${width} * ${height} * 3];
} image = { ${width}, ${height}, 3,
${pixelRows}
};

// ================= PINS =================
#define RED_PIN    8
#define GREEN_PIN  9
#define BLUE_PIN   10
#define HALL_PIN   2

#define NUM_LEDS   8
const int commonPins[NUM_LEDS] = {0, 1, A1, 3, 4, 5, 6, 7};

#define TOTAL_COLS ${width}
#define POV_MIN_RPM 30

// ================= PATTERN =================
byte patternR[TOTAL_COLS][NUM_LEDS];
byte patternG[TOTAL_COLS][NUM_LEDS];
byte patternB[TOTAL_COLS][NUM_LEDS];

void buildPatternFromImage() {
  for (int col = 0; col < TOTAL_COLS; col++) {
    for (int row = 0; row < NUM_LEDS; row++) {
      int idx = (row * image.width + col) * image.bytes_per_pixel;
      patternR[col][row] = pgm_read_byte(&image.pixels[idx]);
      patternG[col][row] = pgm_read_byte(&image.pixels[idx + 1]);
      patternB[col][row] = pgm_read_byte(&image.pixels[idx + 2]);
    }
  }
}

// ================= RPM / SYNC =================
volatile unsigned long lastPulseTime = 0;
volatile unsigned long periodMicros  = 0;
volatile int currentCol = 0;

#define MIN_PERIOD_US 5000UL
#define STALE_TIMEOUT 2000000UL

void hallISR() {
  unsigned long now = micros();
  unsigned long dt  = now - lastPulseTime;

  if (dt > MIN_PERIOD_US) {
    periodMicros  = dt;
    lastPulseTime = now;
    currentCol = 0;  // HARD SYNC TO ROTATION
  }
}

// ================= HELPERS =================
void allOff() {
  for (int i = 0; i < NUM_LEDS; i++) digitalWrite(commonPins[i], HIGH);
  analogWrite(RED_PIN,   0);
  analogWrite(GREEN_PIN, 0);
  analogWrite(BLUE_PIN,  0);
}

void drawColumn(int col) {
  for (int led = 0; led < NUM_LEDS; led++) {
    byte r = patternR[col][led];
    byte g = patternG[col][led];
    byte b = patternB[col][led];

    if (r || g || b) {
      allOff();
      digitalWrite(commonPins[led], LOW);
      analogWrite(RED_PIN,   r);
      analogWrite(GREEN_PIN, g);
      analogWrite(BLUE_PIN,  b);
      delayMicroseconds(60);
    }
  }
  allOff();
}

// ================= SETUP =================
void setup() {
  pinMode(RED_PIN,   OUTPUT);
  pinMode(GREEN_PIN, OUTPUT);
  pinMode(BLUE_PIN,  OUTPUT);

  for (int i = 0; i < NUM_LEDS; i++) {
    pinMode(commonPins[i], OUTPUT);
    digitalWrite(commonPins[i], HIGH);
  }

  pinMode(HALL_PIN, INPUT);
  attachInterrupt(digitalPinToInterrupt(HALL_PIN), hallISR, RISING);

  buildPatternFromImage();
}

// ================= LOOP =================
void loop() {
  unsigned long period;
  unsigned long lastPulse;

  noInterrupts();
  period    = periodMicros;
  lastPulse = lastPulseTime;
  interrupts();

  bool stalled = (period == 0) || ((micros() - lastPulse) > STALE_TIMEOUT);
  float rpm = stalled ? 0 : 60000000.0f / (float)period;

  if (stalled || rpm < POV_MIN_RPM) {
    allOff();
    return;
  }

  unsigned long dwellUs = period / TOTAL_COLS;
  if (dwellUs < 50) dwellUs = 50;

  int col;
  noInterrupts();
  col = currentCol;
  interrupts();

  drawColumn(col);
  delayMicroseconds(dwellUs);

  noInterrupts();
  currentCol = (currentCol + 1) % TOTAL_COLS;
  interrupts();
}
`;
  }

  function hexToRgb(hex) {
    const safeHex = (hex || '#ffffff').replace('#', '');
    return {
      r: parseInt(safeHex.substring(0, 2), 16),
      g: parseInt(safeHex.substring(2, 4), 16),
      b: parseInt(safeHex.substring(4, 6), 16)
    };
  }
})();
